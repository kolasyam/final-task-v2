# =====================================================
# SonarQube Configuration for Sales Intelligence
# =====================================================
# Usage: sonar-scanner -Dproject.settings=sonar-project.properties
# =====================================================

# Project metadata
sonar.projectKey=sales-intelligence
sonar.projectName=Sales Intelligence
sonar.projectVersion=2.0.0

# Source code
sonar.sources=app,training
sonar.tests=tests

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8

# Python specifics
sonar.python.version=3.10
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions
sonar.exclusions=\
    **/__pycache__/**,\
    **/mlruns/**,\
    **/venv/**,\
    **/site-packages/**,\
    **/.pytest_cache/**

# Test exclusions from analysis
sonar.test.exclusions=**/tests/**

# Coverage exclusions
sonar.coverage.exclusions=\
    app/config.py,\
    app/main.py,\
    streamlit_app/**

# Duplication exclusions
sonar.cpd.exclusions=**/constants.py
